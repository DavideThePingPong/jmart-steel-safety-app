<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: rounded square, black -->
  <rect width="512" height="512" rx="80" ry="80" fill="#1a1a1a"/>

  <!-- Yellow warning triangle -->
  <polygon points="256,60 480,430 32,430" fill="#FFD600" stroke="#1a1a1a" stroke-width="8"/>

  <!-- Inner black triangle for border effect -->
  <polygon points="256,100 452,410 60,410" fill="#FFD600"/>

  <!-- Welding mask/helmet silhouette (centered in triangle) -->
  <!-- Helmet dome -->
  <path d="M256,170 C210,170 180,210 180,260 L180,310 C180,325 190,340 210,340 L302,340 C322,340 332,325 332,310 L332,260 C332,210 302,170 256,170 Z" fill="#1a1a1a"/>

  <!-- Visor/viewing window - dark rectangle with slight glow -->
  <rect x="200" y="230" width="112" height="45" rx="6" ry="6" fill="#FF8F00"/>
  <rect x="206" y="236" width="100" height="33" rx="4" ry="4" fill="#FFA000" opacity="0.6"/>

  <!-- Welding sparks (radiating lines from bottom-right) -->
  <g stroke="#FFD600" stroke-width="5" stroke-linecap="round">
    <line x1="340" y1="320" x2="380" y2="290"/>
    <line x1="345" y1="330" x2="395" y2="315"/>
    <line x1="340" y1="340" x2="390" y2="345"/>
    <line x1="330" y1="350" x2="370" y2="370"/>
  </g>

  <!-- Spark dots -->
  <circle cx="385" cy="285" r="5" fill="#FFD600"/>
  <circle cx="400" cy="312" r="4" fill="#FFD600"/>
  <circle cx="395" cy="348" r="5" fill="#FFD600"/>
  <circle cx="375" cy="375" r="4" fill="#FFD600"/>
  <circle cx="365" cy="295" r="3" fill="#FFA000"/>
  <circle cx="405" cy="330" r="3" fill="#FFA000"/>
</svg>
