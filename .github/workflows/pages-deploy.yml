name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          echo "Checking critical files exist..."
          missing=0
          for f in index.html js/app.js sw.js hub-sw.js manifest.json hub-manifest.json icons/icon-192x192.png; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              missing=1
            else
              echo "  ✓ $f"
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "::error::Build verification failed — required files are missing"
            exit 1
          fi
          echo "All critical files present."

      - name: Prepare deployment directory
        run: |
          mkdir -p _site/js _site/icons
          cp index.html offline.html reset.html _site/
          cp artsteel-hub.html steel-app.html jmart-safety-app.html _site/
          cp manifest.json hub-manifest.json _site/
          cp sw.js hub-sw.js _site/
          cp .nojekyll _site/
          cp js/*.js _site/js/
          cp icons/* _site/icons/
          echo "Deployment directory contents:"
          find _site -type f | sort

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
