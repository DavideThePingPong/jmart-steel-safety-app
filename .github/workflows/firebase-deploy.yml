name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (root)
        run: npm ci

      - name: Install dependencies (functions)
        run: npm ci
        working-directory: functions

      - name: Lint (advisory)
        run: npm run lint
        continue-on-error: true

      - name: Tests (advisory)
        run: npm run test:ci
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase (Hosting + Database Rules)
        run: firebase deploy --only hosting,database --token "${{ secrets.FIREBASE_TOKEN }}"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy summary
        if: always()
        run: |
          echo "## Deploy Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Lint: advisory (does not block)" >> $GITHUB_STEP_SUMMARY
          echo "- Tests: advisory (does not block)" >> $GITHUB_STEP_SUMMARY
          echo "- Build: required to pass" >> $GITHUB_STEP_SUMMARY
          echo "- Firebase deploy: hosting + database rules only" >> $GITHUB_STEP_SUMMARY
