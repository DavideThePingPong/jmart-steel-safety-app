<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>J&M Artsteel Hub Moved</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #071017;
      --panel: rgba(18, 29, 40, 0.92);
      --border: rgba(255, 255, 255, 0.08);
      --text: #edf4fb;
      --muted: #9cb0c4;
      --accent: #ff8a3d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Bahnschrift, "Segoe UI Variable", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 138, 61, 0.16), transparent 28%),
        linear-gradient(160deg, #071017 0%, #0d1823 100%);
    }

    .card {
      width: min(520px, 100%);
      padding: 28px;
      border-radius: 24px;
      background: var(--panel);
      border: 1px solid var(--border);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    h1,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: -0.04em;
    }

    p {
      margin-top: 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    a {
      color: var(--accent);
    }
  </style>
  <script>
    (function redirectToStandaloneHub() {
      function buildTarget() {
        try {
          var current = new URL(window.location.href);
          var target = new URL('../artsteel-hub-app/index.html', current);
          target.search = current.search;
          target.hash = current.hash;
          return target.href;
        } catch (error) {
          return '../artsteel-hub-app/index.html' + window.location.search + window.location.hash;
        }
      }

      var target = buildTarget();
      window.__ARTSTEEL_HUB_REDIRECT__ = target;
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <main class="card">
    <h1>J&amp;M Artsteel Hub</h1>
    <p>The safety app copy is now a compatibility shim.</p>
    <p>Redirecting to the standalone hub app at <a id="hub-link" href="../artsteel-hub-app/index.html">../artsteel-hub-app/index.html</a>.</p>
    <noscript>
      <p>JavaScript is disabled. Open <a href="../artsteel-hub-app/index.html">the standalone hub app</a>.</p>
    </noscript>
  </main>
  <script>
    var link = document.getElementById('hub-link');
    if (link && window.__ARTSTEEL_HUB_REDIRECT__) {
      link.href = window.__ARTSTEEL_HUB_REDIRECT__;
      link.textContent = window.__ARTSTEEL_HUB_REDIRECT__;
    }
  </script>
</body>
</html>
